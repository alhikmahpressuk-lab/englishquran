<!DOCTYPE html>
<html lang="en" translate="no" class="notranslate">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Grand Mushaf 1x</title>
  <meta name="description" content="Simple Arabic Qur'an book style reader with Uthmani script, light and dark mode, bookmarks, and all 114 surahs." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f1e8;
      --surface: #fffdf7;
      --surface-2: #f7f2e7;
      --text: #1f1a12;
      --muted: #6b6254;
      --line: #d9cfbc;
      --accent: #0f6a52;
      --accent-soft: rgba(15, 106, 82, 0.08);
      --shadow: 0 18px 50px rgba(40, 32, 18, 0.08);
      --page-width: min(900px, calc(100vw - 2rem));
      --arabic-size: clamp(1.95rem, 2.5vw, 2.55rem);
      --english-size: 0.96rem;
      --title-size: clamp(1.18rem, 1.85vw, 1.45rem);
      --ui-size: 0.95rem;
    }

    body.dark {
      --bg: #101214;
      --surface: #171b20;
      --surface-2: #11151a;
      --text: #f5f0e6;
      --muted: #b1aa9f;
      --line: #2c333b;
      --accent: #79d5b0;
      --accent-soft: rgba(121, 213, 176, 0.11);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
      scroll-behavior: auto;
    }

    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      transition: background 0.25s ease, color 0.25s ease;
    }

    button,
    select,
    input {
      font: inherit;
    }

    .app {
      height: 100dvh;
      min-height: 100dvh;
      overflow: hidden;
      display: block;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: min(340px, 88vw);
      height: 100vh;
      border-right: 1px solid var(--line);
      background: var(--surface-2);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.24s ease;
      z-index: 50;
      box-shadow: var(--shadow);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.22);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.24s ease;
      z-index: 40;
    }

    .sidebar-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .brand {
      padding: 1.2rem 1.1rem 1rem;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.8rem;
    }

    .sidebar-close {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      flex: 0 0 auto;
    }

    .brand-copy {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.1rem;
      letter-spacing: 0.02em;
    }

    .brand p {
      margin: 0.35rem 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .search-wrap {
      padding: 0.9rem 1rem 0.85rem;
      border-bottom: 1px solid var(--line);
    }

    .search-wrap input {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      border-radius: 14px;
      padding: 0.8rem 0.95rem;
      outline: none;
    }

    .surah-list {
      overflow: auto;
      padding: 0.5rem;
    }

    .surah-item {
      width: 100%;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      text-align: left;
      border-radius: 16px;
      padding: 0.8rem 0.9rem;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 0.8rem;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }

    .surah-item:hover,
    .surah-item:focus-visible {
      background: var(--accent-soft);
      border-color: var(--line);
      outline: none;
      transform: translateY(-1px);
    }

    .surah-item.active {
      background: var(--accent-soft);
      border-color: color-mix(in srgb, var(--accent) 30%, var(--line));
    }

    .surah-no {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.9rem;
      background: var(--surface);
      flex-shrink: 0;
    }

    .surah-meta {
      min-width: 0;
    }

    .surah-ar {
      margin: 0 0 0.2rem;
      font-size: 1.15rem;
      direction: rtl;
      text-align: right;
      font-family: "Amiri", "Scheherazade New", "Noto Naskh Arabic", serif;
    }

    .surah-en {
      margin: 0;
      font-size: 0.94rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .surah-type {
      margin-top: 0.18rem;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .main {
      min-width: 0;
      height: 100dvh;
      padding: 0.85rem;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      width: var(--page-width);
      margin: 0 auto 0.75rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 0.65rem;
      align-items: center;
      position: relative;
    }

    .status {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .menu-wrap {
      position: relative;
      margin-left: auto;
    }

    .menu-trigger {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .menu-trigger:hover,
    .menu-trigger:focus-visible {
      transform: translateY(-1px);
      outline: none;
      border-color: color-mix(in srgb, var(--accent) 38%, var(--line));
    }

    .menu-dots {
      display: inline-flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
      justify-content: center;
    }

    .menu-dots span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: currentColor;
      display: block;
    }

    .menu-panel {
      position: absolute;
      top: calc(100% + 0.55rem);
      right: 0;
      min-width: 220px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 0.45rem;
      display: none;
      z-index: 30;
    }

    .menu-panel.open {
      display: block;
    }

    .menu-item {
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      border-radius: 12px;
      padding: 0.82rem 0.9rem;
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease;
    }

    .menu-item:hover,
    .menu-item:focus-visible {
      background: var(--accent-soft);
      border-color: var(--line);
      outline: none;
    }

    .btn {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      border-radius: 999px;
      padding: 0.72rem 1rem;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      box-shadow: none;
      min-height: 44px;
    }

    .btn:hover,
    .btn:focus-visible {
      transform: translateY(-1px);
      outline: none;
      border-color: color-mix(in srgb, var(--accent) 38%, var(--line));
    }

    .reader-shell {
      width: var(--page-width);
      margin: 0 auto;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .page {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: clamp(0.75rem, 2vw, 1.1rem);
      flex: 1;
      min-height: 0;
      display: flex;
      overflow: hidden;
    }

    .page-inner {
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: clamp(0.85rem, 1.6vw, 1.1rem);
      background: linear-gradient(180deg, color-mix(in srgb, var(--surface) 92%, transparent), color-mix(in srgb, var(--surface-2) 58%, transparent));
      overflow: hidden;
      overflow-wrap: anywhere;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      touch-action: pan-x;
      user-select: none;
      -webkit-user-select: none;
    }

    .page-measure {
      position: fixed;
      left: -99999px;
      top: 0;
      visibility: hidden;
      pointer-events: none;
      height: auto !important;
      min-height: 0 !important;
      flex: none !important;
      z-index: -1;
    }

    .surah-header {
      text-align: center;
      padding-bottom: 0.7rem;
      border-bottom: 1px solid var(--line);
      margin-bottom: 0.85rem;
    }

    .surah-header .arabic-name {
      direction: rtl;
      font-size: clamp(1.65rem, 2.45vw, 2.1rem);
      line-height: 1.25;
      margin: 0;
      font-family: "Amiri", "Scheherazade New", "Noto Naskh Arabic", serif;
      font-weight: 700;
    }

    .surah-header .english-name {
      margin: 0.42rem 0 0;
      font-size: clamp(1.04rem, 1.5vw, 1.3rem);
      font-weight: 700;
    }

    .surah-subtitle {
      margin-top: 0.32rem;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .bismillah {
      direction: rtl;
      text-align: center;
      font-size: var(--arabic-size);
      line-height: 1.84;
      margin: 0 0 0.55rem;
      font-family: "Amiri", "Scheherazade New", "Noto Naskh Arabic", serif;
      font-weight: 700;
    }

    .verses {
      display: block;
    }

    .mushaf-block {
      direction: rtl;
      text-align: justify;
      text-justify: inter-word;
      font-size: var(--arabic-size);
      line-height: 2.04;
      font-family: "Amiri", "Scheherazade New", "Noto Naskh Arabic", serif;
      word-spacing: 0.02em;
      padding-top: 0.08rem;
    }

    .ayah-inline {
      white-space: normal;
    }

    .ayah-marker {
      display: inline-grid;
      place-items: center;
      min-width: 1.92em;
      width: 1.92em;
      height: 1.92em;
      padding: 0 0.1em;
      margin: 0 0.08em 0 0.16em;
      color: var(--accent);
      border: 1px solid currentColor;
      border-radius: 50%;
      background: transparent;
      white-space: nowrap;
      font-size: 0.54em;
      line-height: 1;
      font-weight: 700;
      vertical-align: middle;
      box-sizing: border-box;
      overflow: hidden;
    }

    .pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.6rem;
      margin-top: 0;
      flex-wrap: nowrap;
      flex: 0 0 auto;
    }

    .nav-arrow {
      width: 44px;
      min-width: 44px;
      height: 44px;
      padding: 0;
      display: grid;
      place-items: center;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .pagination-center {
      display: flex;
      gap: 0.55rem;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
    }

    .page-jump {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .page-jump select {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      border-radius: 999px;
      padding: 0.72rem 1rem;
      min-height: 44px;
      cursor: pointer;
    }

    

    .loading,
    .empty,
    .error {
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 22px;
      padding: 2rem 1.2rem;
      color: var(--muted);
      background: color-mix(in srgb, var(--surface) 86%, var(--surface-2));
    }

    .bottom-note {
      display: none;
    }

    .page-inner.dense-page {
      padding: 0.58rem 0.72rem;
    }

    .page-inner.dense-page .surah-header {
      padding-bottom: 0.5rem;
      margin-bottom: 0.55rem;
    }

    .page-inner.dense-page .bismillah {
      margin-bottom: 0.38rem;
      line-height: 1.76;
    }

    .page-inner.dense-page .mushaf-block {
      font-size: clamp(1.82rem, 2.25vw, 2.3rem);
      line-height: 1.92;
      word-spacing: 0.018em;
      padding-top: 0;
    }

    .page-inner.surah-one-page .verses {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .page-inner.surah-one-page .mushaf-block {
      font-size: clamp(2rem, 2.7vw, 2.75rem);
      line-height: 2.16;
      text-align: center;
      word-spacing: 0.02em;
    }

    .page-inner.surah-one-page .ayah-marker {
      min-width: 2.08em;
      width: 2.08em;
      height: 2.08em;
      font-size: 0.48em;
    }

    @media (max-width: 980px) {
      .topbar,
      .reader-shell {
        width: min(100%, 860px);
      }
    }

    @media (max-width: 640px) {
      :root {
        --page-width: 100%;
        --arabic-size: clamp(1.7rem, 6.1vw, 2.15rem);
      }

      .main {
        padding: 0.5rem;
      }

      .topbar,
      .reader-shell {
        width: 100%;
      }

      .topbar {
        margin-bottom: 0.45rem;
        gap: 0.4rem;
        align-items: flex-start;
      }

      .pagination,
      .pagination-center {
        width: 100%;
      }

      .pagination > *,
      .pagination-center > * {
        flex: 1 1 auto;
      }

      .btn {
        width: 100%;
        min-height: 40px;
        text-align: center;
      }

      .menu-wrap {
        margin-left: 0;
      }

      .menu-panel {
        right: 0;
        min-width: 200px;
      }

      .page {
        border-radius: 22px;
        padding: 0.55rem;
      }

      .page-inner {
        border-radius: 16px;
        padding: 0.7rem;
      }

      .surah-header {
        padding-bottom: 0.45rem;
        margin-bottom: 0.55rem;
      }

      .page-inner.dense-page {
        padding: 0.55rem;
      }
    }

    @media (orientation: landscape) and (max-height: 540px) {
      :root {
        --page-width: min(100vw - 0.7rem, 1200px);
        --arabic-size: clamp(1.6rem, 2.7vw, 2.1rem);
      }

      .main {
        padding: 0.35rem;
      }

      .topbar {
        margin-bottom: 0.3rem;
        gap: 0.3rem;
      }

      .status {
        font-size: 0.86rem;
      }

      .menu-trigger {
        width: 42px;
        height: 42px;
      }

      .reader-shell {
        gap: 0.3rem;
      }

      .page {
        padding: 0.4rem;
        border-radius: 20px;
      }

      .page-inner {
        padding: 0.48rem 0.62rem;
        border-radius: 14px;
      }

      .surah-header {
        padding-bottom: 0.3rem;
        margin-bottom: 0.35rem;
      }

      .surah-header .arabic-name {
        font-size: clamp(1.35rem, 2vw, 1.7rem);
      }

      .surah-header .english-name {
        margin-top: 0.24rem;
        font-size: 0.98rem;
      }

      .surah-subtitle {
        margin-top: 0.2rem;
        font-size: 0.8rem;
      }

      .bismillah {
        margin-bottom: 0.28rem;
      }

      .pagination {
        gap: 0.35rem;
      }

      .btn,
      .page-jump select {
        min-height: 36px;
        padding: 0.5rem 0.82rem;
      }

      .nav-arrow {
        width: 38px;
        min-width: 38px;
        height: 38px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-copy">
          <h1>Grand Mushaf 1x</h1>
          <p>Simple Arabic Qur’an book reading with Uthmani script, light and dark mode, and bookmarks.</p>
        </div>
        <button class="sidebar-close" id="sidebarClose" type="button" aria-label="Close index">×</button>
      </div>
      <div class="search-wrap">
        <input id="surahSearch" type="search" placeholder="Search a surah in Arabic or English" aria-label="Search surahs" />
      </div>
      <div class="surah-list" id="surahList"></div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="status" id="statusText">Loading surahs…</div>
        <div class="menu-wrap">
          <button class="menu-trigger" id="menuTrigger" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Open reading menu">
            <span class="menu-dots" aria-hidden="true"><span></span><span></span><span></span></span>
          </button>
          <div class="menu-panel" id="menuPanel">
            <button class="menu-item" id="openIndexBtn" type="button">Index</button>
            <button class="menu-item" id="bookmarkBtn" type="button">Bookmark this page</button>
            <button class="menu-item" id="resumeBtn" type="button">Resume bookmark</button>
            <button class="menu-item" id="themeToggle" type="button">Dark mode</button>
          </div>
        </div>
      </div>

      <section class="reader-shell">
        <div class="page">
          <div class="page-inner" id="readerContent">
            <div class="loading">Loading…</div>
          </div>
        </div>
        <div class="pagination" id="pagination" hidden>
          <button class="btn nav-arrow" id="prevPageBtn" type="button" aria-label="Next page">←</button>
          <div class="pagination-center">
            <button class="btn" id="homeBtn" type="button">Home</button>
            <div class="page-jump">
              <select id="pageSelect" aria-label="Verse indicator list"></select>
            </div>
          </div>
          <button class="btn nav-arrow" id="nextPageBtn" type="button" aria-label="Previous page">→</button>
        </div>
        <div class="bottom-note" id="bottomNote">Uthmani text is fetched live for the selected surah.</div>
      </section>
    </main>
  </div>

  <script>
    const SURAHS = [
      { id: 1, ar: 'الفاتحة', en: 'Al-Fātiḥah (The Opening)', ayahs: 7, place: 'Makkah' },
      { id: 2, ar: 'البقرة', en: 'Al-Baqarah (The Cow)', ayahs: 286, place: 'Madinah' },
      { id: 3, ar: 'آل عمران', en: 'Āl ʿImrān (The Family of ʿImrān)', ayahs: 200, place: 'Madinah' },
      { id: 4, ar: 'النساء', en: 'An-Nisāʾ (The Women)', ayahs: 176, place: 'Madinah' },
      { id: 5, ar: 'المائدة', en: 'Al-Māʾidah (The Table Spread)', ayahs: 120, place: 'Madinah' },
      { id: 6, ar: 'الأنعام', en: 'Al-Anʿām (The Cattle)', ayahs: 165, place: 'Makkah' },
      { id: 7, ar: 'الأعراف', en: 'Al-Aʿrāf (The Heights)', ayahs: 206, place: 'Makkah' },
      { id: 8, ar: 'الأنفال', en: 'Al-Anfāl (The Spoils of War)', ayahs: 75, place: 'Madinah' },
      { id: 9, ar: 'التوبة', en: 'At-Tawbah (Repentance)', ayahs: 129, place: 'Madinah' },
      { id: 10, ar: 'يونس', en: 'Yūnus (Jonah)', ayahs: 109, place: 'Makkah' },
      { id: 11, ar: 'هود', en: 'Hūd (Hud)', ayahs: 123, place: 'Makkah' },
      { id: 12, ar: 'يوسف', en: 'Yūsuf (Joseph)', ayahs: 111, place: 'Makkah' },
      { id: 13, ar: 'الرعد', en: 'Ar-Raʿd (The Thunder)', ayahs: 43, place: 'Madinah' },
      { id: 14, ar: 'ابراهيم', en: 'Ibrāhīm (Abraham)', ayahs: 52, place: 'Makkah' },
      { id: 15, ar: 'الحجر', en: 'Al-Ḥijr (The Rocky Tract)', ayahs: 99, place: 'Makkah' },
      { id: 16, ar: 'النحل', en: 'An-Naḥl (The Bee)', ayahs: 128, place: 'Makkah' },
      { id: 17, ar: 'الإسراء', en: 'Al-Isrāʾ (The Night Journey)', ayahs: 111, place: 'Makkah' },
      { id: 18, ar: 'الكهف', en: 'Al-Kahf (The Cave)', ayahs: 110, place: 'Makkah' },
      { id: 19, ar: 'مريم', en: 'Maryam (Mary)', ayahs: 98, place: 'Makkah' },
      { id: 20, ar: 'طه', en: 'Ṭā Hā', ayahs: 135, place: 'Makkah' },
      { id: 21, ar: 'الأنبياء', en: 'Al-Anbiyāʾ (The Prophets)', ayahs: 112, place: 'Makkah' },
      { id: 22, ar: 'الحج', en: 'Al-Ḥajj (The Pilgrimage)', ayahs: 78, place: 'Madinah' },

    function loadSettings() {
      try {

        if (saved && typeof saved === 'object') {
          state.settings = { ...state.settings, ...saved };
        }
      } catch (error) {
        console.warn('Could not load settings', error);
      }
    }

    function saveSettings() {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings));
    }

    function applyTheme() {
      document.body.classList.toggle('dark', state.settings.theme === 'dark');
      els.themeToggle.textContent = state.settings.theme === 'dark' ? 'Light mode' : 'Dark mode';
    }

    function getSelectedSurah() {
      return SURAHS.find((surah) => surah.id === state.selectedSurahId) || SURAHS[0];
    }

    function toArabicDigits(value) {
      return String(value).replace(/\d/g, (digit) => '٠١٢٣٤٥٦٧٨٩'[Number(digit)]);
    }

    function normaliseText(text) {
      return String(text)
        .toLowerCase()
        .normalize('NFKD')
        .replace(/[\u0300-\u036f]/g, '');
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function filteredSurahs() {
      const q = normaliseText(state.query.trim());
      if (!q) return SURAHS;
      return SURAHS.filter((surah) => {
        return [surah.en, surah.ar, String(surah.id), surah.place].some((field) => normaliseText(field).includes(q));
      });
    }

    function renderSurahList() {
      const items = filteredSurahs();
      if (!items.length) {
        els.surahList.innerHTML = '<div class="empty">No surah matched your search.</div>';
        return;
      }

      els.surahList.innerHTML = items.map((surah) => `
        <button class="surah-item ${surah.id === state.selectedSurahId ? 'active' : ''}" type="button" data-surah-id="${surah.id}">
          <span class="surah-no">${surah.id}</span>
          <span class="surah-meta">
            <p class="surah-ar">${escapeHtml(surah.ar)}</p>
            <p class="surah-en">${escapeHtml(surah.en)}</p>
            <div class="surah-type">${escapeHtml(surah.place)}, ${surah.ayahs} verses</div>
          </span>
        </button>
      `).join('');
    }

    function estimateVerseWeight(verse) {
      const text = verse.arabic || '';
      return Math.max(1, Math.ceil(text.length / 34));
    }

    async function fetchJsonWithTimeout(url, timeout = 12000) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeout);

      try {
        const response = await fetch(url, {
          signal: controller.signal,
          headers: {
            Accept: 'application/json'
          }
        });

        if (!response.ok) {
          throw new Error(`Request failed: ${response.status}`);
        }

        return await response.json();
      } finally {
        clearTimeout(timeoutId);
      }
    }

    function fallbackPaginateVerses(verses) {
      const surah = getSelectedSurah();
      const targetUnits = window.innerWidth < 640 ? 22 : window.innerWidth < 900 ? 28 : 32;
      const pages = [];
      let current = [];
      let used = 0;

      verses.forEach((verse, index) => {
        const weight = estimateVerseWeight(verse);
        const extra = index === 0 && surah.id !== 1 && surah.id !== 9 ? 3 : 0;

        if (current.length && used + weight + extra > targetUnits) {
          pages.push({ verses: [...current], dense: false });
          current = [];
          used = 0;
        }

        current.push(verse);
        used += weight + extra;
      });

      if (current.length) {
        pages.push({ verses: [...current], dense: false });
      }

      return pages;
    }

    function ensureMeasureRoot() {
      let measureRoot = document.getElementById('pageMeasure');
      if (!measureRoot) {
        measureRoot = document.createElement('div');
        measureRoot.id = 'pageMeasure';
        measureRoot.className = 'page-inner page-measure';
        document.body.appendChild(measureRoot);
      }
      return measureRoot;
    }

    function buildMushafText(pageVerses) {
      const surah = getSelectedSurah();

      return pageVerses.map((verse) => {
        const shouldStripBismillah = surah.id !== 1 && surah.id !== 9 && verse.number === 1;
        const arabic = shouldStripBismillah ? stripLeadingBismillah(verse.arabic) || verse.arabic : verse.arabic;
        const marker = verse.showMarker === false ? '' : ` <span class="ayah-marker">${toArabicDigits(verse.number)}</span>`;

        return `
          <span class="ayah-inline">${escapeHtml(arabic)}${marker}</span>
        `;
      }).join(' ');
    }

    function stripLeadingBismillah(text) {
      const original = String(text).trim();
      const marks = ['َ', 'ً', 'ُ', 'ٌ', 'ِ', 'ٍ', 'ْ', 'ّ', 'ٰ', 'ٔ', 'ٖ', 'ٗ', 'ۡ', 'ۢ', 'ۣ', 'ۤ', 'ۥ', 'ۦ', 'ۧ', 'ۨ', '۪', '۫', '۬', 'ۭ', 'ـ'];
      const tailVariants = ['الرَّحِيمِ', 'الرَّحِيم', 'ٱلرَّحِيمِ', 'ٱلرَّحِيم', 'الرحيم'];

      const normalizeArabic = (value) => {
        let result = String(value).normalize('NFKD');
        for (const mark of marks) {
          result = result.split(mark).join('');
        }
        return result
          .split('أ').join('ا')
          .split('إ').join('ا')
          .split('آ').join('ا')
          .split('ٱ').join('ا')
          .split('ى').join('ي')
          .split('  ').join(' ')
          .trim();
      };

      const normalized = normalizeArabic(original);
      if (!normalized.startsWith('بسم الله الرحمن الرحيم')) {
        return original;
      }

      for (const tail of tailVariants) {
        const index = original.indexOf(tail);
        if (index !== -1) {
          return original.slice(index + tail.length).trim();
        }
      }

      return original;
    }

    function buildReaderMarkup(surah, pageVerses, includeBismillah) {
      const firstVerse = pageVerses[0]?.number;
      const lastVerse = pageVerses[pageVerses.length - 1]?.number;

      return `
        <header class="surah-header">
          <p class="arabic-name">${escapeHtml(surah.ar)}</p>
          <p class="english-name">${escapeHtml(surah.en)}</p>
          <div class="surah-subtitle">Surah ${surah.id}, ${escapeHtml(surah.place)}</div>
        </header>
        ${includeBismillah ? '<div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>' : ''}
        <div class="verses">
          <div class="mushaf-block">${buildMushafText(pageVerses)}</div>
          
        </div>
      `;
    }

    function splitVerseForPage(verse, surah, includeBismillah, measureRoot, maxHeight, dense) {
      const words = String(verse.arabic).split(' ').filter(Boolean);
      if (words.length < 2) return null;

      let low = 1;
      let high = words.length - 1;
      let bestFit = 0;

      while (low <= high) {
        const mid = Math.floor((low + high) / 2);
        const candidate = {
          ...verse,
          arabic: words.slice(0, mid).join(' '),
          showMarker: false
        };

        measureRoot.classList.toggle('compact-page', false);
        measureRoot.classList.toggle('surah-one-page', surah.id === 1);
        measureRoot.classList.toggle('dense-page', dense);
        measureRoot.innerHTML = buildReaderMarkup(surah, [candidate], includeBismillah);

        if (measureRoot.scrollHeight <= maxHeight) {
          bestFit = mid;
          low = mid + 1;
        } else {
          high = mid - 1;
        }
      }

      if (!bestFit || bestFit >= words.length) return null;

      return {
        fit: {
          ...verse,
          arabic: words.slice(0, bestFit).join(' '),
          showMarker: false
        },
        rest: {
          ...verse,
          arabic: words.slice(bestFit).join(' '),
          showMarker: verse.showMarker
        }
      };
    }

    function paginateVerses(verses) {
      const surah = getSelectedSurah();
      const maxHeight = els.readerContent.clientHeight;
      const pageWidth = els.readerContent.offsetWidth;
      const minimumVerses = surah.ayahs <= 12 ? surah.ayahs : surah.ayahs <= 40 ? 7 : window.innerWidth < 640 ? 6 : 8;

      if (!verses.length) return [];
      if (!maxHeight || !pageWidth) return fallbackPaginateVerses(verses);

      try {
        const measureRoot = ensureMeasureRoot();
        measureRoot.style.width = `${pageWidth}px`;

        const queue = verses.map((verse) => ({
          ...verse,
          showMarker: verse.showMarker !== false
        }));
        const pages = [];

        while (queue.length) {
          const pageVerses = [];
          const includeBismillah = surah.id !== 1 && surah.id !== 9 && pages.length === 0;
          let dense = false;

          while (queue.length) {
            const verse = queue[0];
            pageVerses.push(verse);
            measureRoot.classList.toggle('compact-page', false);
            measureRoot.classList.toggle('surah-one-page', surah.id === 1);
            measureRoot.classList.toggle('dense-page', dense);
            measureRoot.innerHTML = buildReaderMarkup(surah, pageVerses, includeBismillah);

            if (measureRoot.scrollHeight > maxHeight) {
              if (!dense && surah.id !== 1 && pageVerses.length <= minimumVerses) {
                dense = true;
                measureRoot.classList.add('dense-page');
                measureRoot.innerHTML = buildReaderMarkup(surah, pageVerses, includeBismillah);

                if (measureRoot.scrollHeight <= maxHeight) {
                  queue.shift();
                  continue;
                }
              }

              if (pageVerses.length === 1) {
                const split = splitVerseForPage(verse, surah, includeBismillah, measureRoot, maxHeight, dense);
                if (split) {
                  pageVerses[0] = split.fit;
                  queue[0] = split.rest;
                  break;
                }
              }

              pageVerses.pop();
              if (!pageVerses.length) {
                pageVerses.push(queue.shift());
              }
              break;
            }

            queue.shift();
          }

          pages.push({ verses: [...pageVerses], dense });
        }

        return pages.length ? pages : fallbackPaginateVerses(verses);
      } catch (error) {
        console.error('Pagination fallback used', error);
        return fallbackPaginateVerses(verses);
      }
    }

    async function fetchSurahVerses(surahId) {
      if (state.cache.has(surahId)) {
        return state.cache.get(surahId);
      }

      const normaliseQuranComVerses = (payload) => {
        return (payload.verses || payload.data?.verses || [])
          .map((verse) => {
            const verseNumber = verse.verse_number || Number(String(verse.verse_key || '').split(':')[1]);
            return {
              number: verseNumber,
              arabic: verseNumber === 1 && surahId !== 1 && surahId !== 9 ? stripLeadingBismillah(verse.text_uthmani) || verse.text_uthmani : verse.text_uthmani
            };
          })
          .filter((verse) => verse.number && verse.arabic)
          .sort((a, b) => a.number - b.number);
      };

      try {
        const cloudPayload = await fetchJsonWithTimeout(`https://api.alquran.cloud/v1/surah/${surahId}/quran-uthmani`);
        const verses = (cloudPayload.data?.ayahs || [])
          .map((ayah) => ({
            number: ayah.numberInSurah,
            arabic: ayah.numberInSurah === 1 && surahId !== 1 && surahId !== 9 ? stripLeadingBismillah(ayah.text) || ayah.text : ayah.text
          }))
          .filter((verse) => verse.number && verse.arabic)
          .sort((a, b) => a.number - b.number);

        if (!verses.length) {
          throw new Error(`No verses returned for surah ${surahId}`);
        }

        state.cache.set(surahId, verses);
        return verses;
      } catch (cloudError) {
        console.warn('Al Quran Cloud failed, falling back', cloudError);
      }

      try {
        const uthmaniPayload = await fetchJsonWithTimeout(`${API_BASE}/quran/verses/uthmani?chapter_number=${surahId}`);
        const verses = normaliseQuranComVerses(uthmaniPayload);

        if (!verses.length) {
          throw new Error(`No verses returned for surah ${surahId}`);
        }

        state.cache.set(surahId, verses);
        return verses;
      } catch (primaryError) {
        console.warn('Quran.com Uthmani endpoint failed, falling back', primaryError);
      }

      const surah = SURAHS.find((item) => item.id === surahId);
      const perPage = 50;
      const totalPages = Math.ceil(surah.ayahs / perPage);
      const payloads = await Promise.all(
        Array.from({ length: totalPages }, (_, index) => {
          const page = index + 1;
          return fetchJsonWithTimeout(`${API_BASE}/verses/by_chapter/${surahId}?fields=text_uthmani&per_page=${perPage}&page=${page}`);
        })
      );

      const verses = payloads.flatMap(normaliseQuranComVerses);
      if (!verses.length) {
        throw new Error(`No verses returned for surah ${surahId}`);
      }

      state.cache.set(surahId, verses);
      return verses;
    }

    function renderPageSelect() {
      const pageData = state.pages[state.currentPage] || { verses: [] };
      const firstVerse = pageData.verses[0]?.number ?? 1;
      const lastVerse = pageData.verses[pageData.verses.length - 1]?.number ?? firstVerse;

      els.pageSelect.innerHTML = state.pages.map((page, index) => {
        const first = page.verses[0]?.number ?? 1;
        const last = page.verses[page.verses.length - 1]?.number ?? first;
        return `<option value="${index}" ${index === state.currentPage ? 'selected' : ''}>${index + 1} • ${first}-${last}</option>`;
      }).join('');
    }

    function updateLocationHash() {
      history.replaceState(null, '', `#surah-${state.selectedSurahId}-page-${state.currentPage + 1}`);
    }

    function renderReader() {
      const surah = getSelectedSurah();
      const pageData = state.pages[state.currentPage] || { verses: [], dense: false };
      const pageVerses = pageData.verses || [];

      if (!pageVerses.length) {
        els.readerContent.innerHTML = '<div class="empty">No verses to show.</div>';
        els.pagination.hidden = true;
        return;
      }

      const showBismillah = surah.id !== 1 && surah.id !== 9 && state.currentPage === 0;
      els.readerContent.classList.toggle('compact-page', false);
      els.readerContent.classList.toggle('surah-one-page', surah.id === 1);
      els.readerContent.classList.toggle('dense-page', Boolean(pageData.dense));
      els.readerContent.innerHTML = buildReaderMarkup(surah, pageVerses, showBismillah);
      els.pagination.hidden = false;
      els.prevPageBtn.disabled = state.selectedSurahId === 114 && state.currentPage >= state.pages.length - 1;
      els.nextPageBtn.disabled = state.selectedSurahId === 1 && state.currentPage === 0;
      els.statusText.textContent = `${surah.en} • Page ${state.currentPage + 1} of ${state.pages.length}`;
      renderPageSelect();
    }

    function goToPage(pageIndex) {
      const nextPage = Math.max(0, Math.min(pageIndex, state.pages.length - 1));
      if (nextPage === state.currentPage) return false;
      state.currentPage = nextPage;
      renderReader();
      updateLocationHash();
      return true;
    }

    async function goToPreviousPage() {
      if (state.loading) return false;

      if (state.currentPage > 0) {
        return goToPage(state.currentPage - 1);
      }

      const previousSurah = SURAHS.find((surah) => surah.id === state.selectedSurahId - 1);
      if (!previousSurah) return false;

      await selectSurah(previousSurah.id, Number.MAX_SAFE_INTEGER);
      return true;
    }

    async function goToNextPage() {
      if (state.loading) return false;

      if (state.currentPage < state.pages.length - 1) {
        return goToPage(state.currentPage + 1);
      }

      const nextSurah = SURAHS.find((surah) => surah.id === state.selectedSurahId + 1);
      if (!nextSurah) return false;

      await selectSurah(nextSurah.id, 0);
      return true;
    }

    async function selectSurah(surahId, preferredPage = 0) {
      state.selectedSurahId = surahId;
      state.loading = true;
      renderSurahList();
      els.statusText.textContent = 'Loading surah…';
      els.readerContent.innerHTML = '<div class="loading">Loading surah…</div>';
      els.pagination.hidden = true;

      try {
        const verses = await fetchSurahVerses(surahId);
        state.verses = verses;

        await new Promise((resolve) => requestAnimationFrame(resolve));

        state.pages = paginateVerses(verses);
        if (!state.pages.length) {
          state.pages = fallbackPaginateVerses(verses);
        }

        state.currentPage = Math.min(Math.max(preferredPage, 0), Math.max(state.pages.length - 1, 0));
        renderReader();
        updateLocationHash();
      } catch (error) {
        console.error(error);
        els.statusText.textContent = 'Could not load the surah';
        els.readerContent.innerHTML = '<div class="error">The surah could not be loaded right now. Please try again.</div>';
        els.pagination.hidden = true;
      } finally {
        state.loading = false;
      }
    }

    function saveBookmark() {
      const surah = getSelectedSurah();
      const payload = {
        surahId: surah.id,
        page: state.currentPage,
        savedAt: new Date().toISOString()
      };
      localStorage.setItem(BOOKMARK_KEY, JSON.stringify(payload));
      els.statusText.textContent = `Bookmark saved for ${surah.en}, page ${state.currentPage + 1}`;
    }

    function loadBookmark() {
      try {
        const bookmark = JSON.parse(localStorage.getItem(BOOKMARK_KEY));
        if (!bookmark || !bookmark.surahId) return null;
        return bookmark;
      } catch (error) {
        console.warn('Could not load bookmark', error);
        return null;
      }
    }

    async function resumeBookmark() {
      const bookmark = loadBookmark();
      if (!bookmark) {
        els.statusText.textContent = 'No bookmark saved yet';
        return;
      }
      await selectSurah(bookmark.surahId, bookmark.page || 0);
    }

    function parseHash() {
      const match = window.location.hash.match(/surah-(\d+)-page-(\d+)/i);
      if (!match) return null;
      const surahId = Number(match[1]);
      const page = Math.max(0, Number(match[2]) - 1);
      if (!SURAHS.find((surah) => surah.id === surahId)) return null;
      return { surahId, page };
    }

    function closeMenu() {
      els.menuPanel.classList.remove('open');
      els.menuTrigger.setAttribute('aria-expanded', 'false');
    }

    function openMenu() {
      els.menuPanel.classList.add('open');
      els.menuTrigger.setAttribute('aria-expanded', 'true');
    }

    function toggleMenu() {
      if (els.menuPanel.classList.contains('open')) {
        closeMenu();
      } else {
        openMenu();
      }
    }

    function openIndexPanel() {
      els.sidebar.classList.add('open');
      els.sidebarBackdrop.classList.add('open');
    }

    function closeIndexPanel() {
      els.sidebar.classList.remove('open');
      els.sidebarBackdrop.classList.remove('open');
    }

    function bindEvents() {
      els.surahSearch.addEventListener('input', (event) => {
        state.query = event.target.value;
        renderSurahList();
      });

      els.surahList.addEventListener('click', (event) => {
        const button = event.target.closest('[data-surah-id]');
        if (!button) return;
        closeIndexPanel();
        selectSurah(Number(button.dataset.surahId), 0);
      });

      els.menuTrigger.addEventListener('click', (event) => {
        event.stopPropagation();
        toggleMenu();
      });

      els.themeToggle.addEventListener('click', () => {
        state.settings.theme = state.settings.theme === 'dark' ? 'light' : 'dark';
        applyTheme();
        saveSettings();
        closeMenu();
      });

      els.bookmarkBtn.addEventListener('click', () => {
        saveBookmark();
        closeMenu();
      });

      els.resumeBtn.addEventListener('click', async () => {
        closeMenu();
        await resumeBookmark();
      });

      els.openIndexBtn.addEventListener('click', () => {
        closeMenu();
        openIndexPanel();
      });

      els.sidebarClose.addEventListener('click', closeIndexPanel);
      els.sidebarBackdrop.addEventListener('click', closeIndexPanel);

      document.addEventListener('click', (event) => {
        if (!event.target.closest('.menu-wrap')) {
          closeMenu();
        }
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          closeMenu();
          closeIndexPanel();
        }

        if (event.key === 'ArrowLeft') {
          goToPreviousPage();
        }

        if (event.key === 'ArrowRight') {
          goToNextPage();
        }
      });

      els.homeBtn.addEventListener('click', () => {
        openIndexPanel();
      });

      els.prevPageBtn.addEventListener('click', () => {
        goToNextPage();
      });

      els.nextPageBtn.addEventListener('click', () => {
        goToPreviousPage();
      });

      els.pageSelect.addEventListener('change', (event) => {
        goToPage(Number(event.target.value));
      });

      

      

      let touchStartX = 0;
      let touchStartY = 0;

      els.readerContent.addEventListener('touchstart', (event) => {
        if (event.touches.length !== 1) return;
        touchStartX = event.touches[0].clientX;
        touchStartY = event.touches[0].clientY;
      }, { passive: true });

      els.readerContent.addEventListener('touchend', (event) => {
        const touch = event.changedTouches[0];
        if (!touch) return;

        const deltaX = touch.clientX - touchStartX;
        const deltaY = touch.clientY - touchStartY;

        if (Math.abs(deltaX) < 45 || Math.abs(deltaX) <= Math.abs(deltaY)) {
          return;
        }

        if (deltaX > 0) {
          goToNextPage();
        } else {
          goToPreviousPage();
        }
      }, { passive: true });

      let resizeFrame = 0;
      window.addEventListener('resize', () => {
        if (!state.verses.length) return;
        cancelAnimationFrame(resizeFrame);
        resizeFrame = requestAnimationFrame(() => {
          const currentVerse = state.pages[state.currentPage]?.verses?.[0]?.number || 1;
          state.pages = paginateVerses(state.verses);
          const newPageIndex = state.pages.findIndex((page) => page.verses[0]?.number === currentVerse);
          state.currentPage = newPageIndex >= 0 ? newPageIndex : 0;
          renderReader();
        });
      });
    }

    async function init() {
      loadSettings();
      applyTheme();
      renderSurahList();
      bindEvents();

      const hashState = parseHash();
      const bookmark = loadBookmark();

      if (hashState) {
        await selectSurah(hashState.surahId, hashState.page);
        return;
      }

      if (bookmark) {
        await selectSurah(bookmark.surahId, bookmark.page || 0);
        return;
      }

      await selectSurah(1, 0);
    }

    init();
  </script>
</body>
</html>
