<!DOCTYPE html>
<html lang="en" translate="no" class="notranslate">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Grand Mushaf 1x</title>
  <meta name="description" content="Simple Arabic Qur'an book style reader with Uthmani script, light and dark mode, bookmarks, and all 114 surahs." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f1e8;
      --surface: #fffdf7;
      --surface-2: #f7f2e7;
      --text: #1f1a12;
      --muted: #6b6254;
      --line: #d9cfbc;
      --accent: #0f6a52;
      --accent-soft: rgba(15, 106, 82, 0.08);
      --shadow: 0 18px 50px rgba(40, 32, 18, 0.08);
      --page-width: min(900px, calc(100vw - 2rem));
      --arabic-size: clamp(2rem, 2.9vw, 2.9rem);
      --english-size: 0.98rem;
      --title-size: clamp(1.3rem, 2vw, 1.7rem);
      --ui-size: 0.95rem;
    }

    body.dark {
      --bg: #101214;
      --surface: #171b20;
      --surface-2: #11151a;
      --text: #f5f0e6;
      --muted: #b1aa9f;
      --line: #2c333b;
      --accent: #79d5b0;
      --accent-soft: rgba(121, 213, 176, 0.11);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      transition: background 0.25s ease, color 0.25s ease;
    }

    button,
    select,
    input {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: block;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: min(340px, 88vw);
      height: 100vh;
      border-right: 1px solid var(--line);
      background: var(--surface-2);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.24s ease;
      z-index: 50;
      box-shadow: var(--shadow);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.22);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.24s ease;
      z-index: 40;
    }

    .sidebar-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .brand {
      padding: 1.2rem 1.1rem 1rem;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.8rem;
    }

    .sidebar-close {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      flex: 0 0 auto;
    }

    .brand-copy {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.1rem;
      letter-spacing: 0.02em;
    }

    .brand p {
      margin: 0.35rem 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .search-wrap {
      padding: 0.9rem 1rem 0.85rem;
      border-bottom: 1px solid var(--line);
    }

    .search-wrap input {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      border-radius: 14px;
      padding: 0.8rem 0.95rem;
      outline: none;
    }

    .surah-list {
      overflow: auto;
      padding: 0.5rem;
    }

    .surah-item {
      width: 100%;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      text-align: left;
      border-radius: 16px;
      padding: 0.8rem 0.9rem;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 0.8rem;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }

    .surah-item:hover,
    .surah-item:focus-visible {
      background: var(--accent-soft);
      border-color: var(--line);
      outline: none;
      transform: translateY(-1px);
    }

    .surah-item.active {
      background: var(--accent-soft);
      border-color: color-mix(in srgb, var(--accent) 30%, var(--line));
    }

    .surah-no {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.9rem;
      background: var(--surface);
      flex-shrink: 0;
    }

    .surah-meta {
      min-width: 0;
    }

    .surah-ar {
      margin: 0 0 0.2rem;
      font-size: 1.15rem;
      direction: rtl;
      text-align: right;
      font-family: "Amiri", "Scheherazade New", "Noto Naskh Arabic", serif;
    }

    .surah-en {
      margin: 0;
      font-size: 0.94rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .surah-type {
      margin-top: 0.18rem;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .main {
      min-width: 0;
      padding: 1rem;
    }

    .topbar {
      width: var(--page-width);
      margin: 0 auto 1rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 0.8rem;
      align-items: center;
      position: relative;
    }

    .status {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .menu-wrap {
      position: relative;
      margin-left: auto;
    }

    .menu-trigger {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .menu-trigger:hover,
    .menu-trigger:focus-visible {
      transform: translateY(-1px);
      outline: none;
      border-color: color-mix(in srgb, var(--accent) 38%, var(--line));
    }

    .menu-dots {
      display: inline-flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
      justify-content: center;
    }

    .menu-dots span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: currentColor;
      display: block;
    }

    .menu-panel {
      position: absolute;
      top: calc(100% + 0.55rem);
      right: 0;
      min-width: 220px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 0.45rem;
      display: none;
      z-index: 30;
    }

    .menu-panel.open {
      display: block;
    }

    .menu-item {
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      border-radius: 12px;
      padding: 0.82rem 0.9rem;
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease;
    }

    .menu-item:hover,
    .menu-item:focus-visible {
      background: var(--accent-soft);
      border-color: var(--line);
      outline: none;
    }

    .btn,
    .page-jump select {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      border-radius: 999px;
      padding: 0.72rem 1rem;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      box-shadow: none;
      min-height: 44px;
    }

    .btn:hover,
    .btn:focus-visible,
    .page-jump select:hover,
    .page-jump select:focus-visible {
      transform: translateY(-1px);
      outline: none;
      border-color: color-mix(in srgb, var(--accent) 38%, var(--line));
    }

    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    body.dark .btn.primary {
      color: #072017;
      font-weight: 700;
    }

    .reader-shell {
      width: var(--page-width);
      margin: 0 auto;
    }

    .page {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: clamp(1rem, 3vw, 1.6rem);
    }

    .page-inner {
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: clamp(1rem, 3vw, 2rem);
      background: linear-gradient(180deg, color-mix(in srgb, var(--surface) 90%, transparent), color-mix(in srgb, var(--surface-2) 65%, transparent));
      overflow-wrap: anywhere;
    }

    .surah-header {
      text-align: center;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--line);
      margin-bottom: 1.2rem;
    }

    .surah-header .arabic-name {
      direction: rtl;
      font-size: clamp(1.9rem, 3vw, 2.5rem);
      line-height: 1.3;
      margin: 0;
      font-family: "Amiri", "Scheherazade New", "Noto Naskh Arabic", serif;
      font-weight: 700;
    }

    .surah-header .english-name {
      margin: 0.5rem 0 0;
      font-size: var(--title-size);
      font-weight: 700;
    }

    .surah-subtitle {
      margin-top: 0.45rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .bismillah {
      direction: rtl;
      text-align: center;
      font-size: clamp(2rem, 3vw, 2.6rem);
      line-height: 1.85;
      margin: 0 0 1.3rem;
      font-family: "Amiri", "Scheherazade New", "Noto Naskh Arabic", serif;
      font-weight: 700;
    }

    .verses {
      display: block;
    }

    .mushaf-block {
      direction: rtl;
      text-align: justify;
      text-justify: inter-word;
      font-size: var(--arabic-size);
      line-height: 2.25;
      font-family: "Amiri", "Scheherazade New", "Noto Naskh Arabic", serif;
      word-spacing: 0.05em;
      padding-top: 0.25rem;
    }

    .ayah-inline {
      white-space: normal;
    }

    .ayah-marker {
      display: inline-grid;
      place-items: center;
      width: 1.9em;
      height: 1.9em;
      margin: 0 0.14em 0 0.22em;
      color: var(--accent);
      border: 1px solid currentColor;
      border-radius: 50%;
      background: transparent;
      white-space: nowrap;
      font-size: 0.68em;
      line-height: 1;
      font-weight: 700;
      vertical-align: middle;
      box-sizing: border-box;
    }

    .verse-meta {
      margin-top: 0.8rem;
      text-align: center;
      color: var(--muted);
      font-size: var(--english-size);
    }

    .pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .pagination-center {
      display: flex;
      gap: 0.65rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .page-jump {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .loading,
    .empty,
    .error {
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 22px;
      padding: 2rem 1.2rem;
      color: var(--muted);
      background: color-mix(in srgb, var(--surface) 86%, var(--surface-2));
    }

    .bottom-note {
      text-align: center;
      margin-top: 0.9rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 980px) {
      .main {
        padding: 0.85rem;
      }

      .topbar,
      .reader-shell {
        width: min(100%, 900px);
      }
    }

    @media (max-width: 640px) {
      .pagination,
      .pagination-center {
        width: 100%;
      }

      .pagination > *,
      .pagination-center > * {
        flex: 1 1 auto;
      }

      .btn,
      .page-jump select {
        width: 100%;
        text-align: center;
      }

      .page-jump {
        width: 100%;
        justify-content: space-between;
      }

      .topbar {
        align-items: flex-start;
      }

      .menu-wrap {
        margin-left: 0;
      }

      .menu-panel {
        right: 0;
        min-width: 200px;
      }

      .page {
        border-radius: 22px;
        padding: 0.8rem;
      }

      .page-inner {
        border-radius: 16px;
        padding: 0.85rem;
      }

      
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-copy">
          <h1>Grand Mushaf 1x</h1>
          <p>Simple Arabic Qur’an book reading with Uthmani script, light and dark mode, and bookmarks.</p>
        </div>
        <button class="sidebar-close" id="sidebarClose" type="button" aria-label="Close index">×</button>
      </div>
      <div class="search-wrap">
        <input id="surahSearch" type="search" placeholder="Search a surah in Arabic or English" aria-label="Search surahs" />
      </div>
      <div class="surah-list" id="surahList"></div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="status" id="statusText">Loading surahs…</div>
        <div class="menu-wrap">
          <button class="menu-trigger" id="menuTrigger" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Open reading menu">
            <span class="menu-dots" aria-hidden="true"><span></span><span></span><span></span></span>
          </button>
          <div class="menu-panel" id="menuPanel">
            <button class="menu-item" id="openIndexBtn" type="button">Index</button>
            <button class="menu-item" id="bookmarkBtn" type="button">Bookmark this page</button>
            <button class="menu-item" id="resumeBtn" type="button">Resume bookmark</button>
            <button class="menu-item" id="themeToggle" type="button">Dark mode</button>
          </div>
        </div>
      </div>

      <section class="reader-shell">
        <div class="page">
          <div class="page-inner" id="readerContent">
            <div class="loading">Loading…</div>
          </div>
        </div>
        <div class="pagination" id="pagination" hidden>
          <button class="btn" id="prevPageBtn" type="button">Previous page</button>
          <div class="pagination-center">
            <div class="page-jump">
              <label for="pageSelect">Page</label>
              <select id="pageSelect" aria-label="Select page"></select>
            </div>
          </div>
          <button class="btn primary" id="nextPageBtn" type="button">Next page</button>
        </div>
        <div class="bottom-note" id="bottomNote">Uthmani text is fetched live for the selected surah.</div>
      </section>
    </main>
  </div>

      { id: 114, ar: 'الناس', en: 'An-Nās (Humankind)', ayahs: 6, place: 'Makkah' }

    const API_BASE = 'https://api.quran.com/api/v4';
    const SETTINGS_KEY = 'open-quran-tilawah-settings';
    const BOOKMARK_KEY = 'open-quran-tilawah-bookmark';

    const state = {
      selectedSurahId: 1,
      verses: [],
      pages: [],
      currentPage: 0,
      query: '',
      loading: false,
      cache: new Map(),
      settings: {
        theme: 'light'
      }
    };

    const els = {
      sidebar: document.getElementById('sidebar'),
      sidebarBackdrop: document.getElementById('sidebarBackdrop'),
      sidebarClose: document.getElementById('sidebarClose'),
      surahList: document.getElementById('surahList'),
      surahSearch: document.getElementById('surahSearch'),
      statusText: document.getElementById('statusText'),
      themeToggle: document.getElementById('themeToggle'),
      bookmarkBtn: document.getElementById('bookmarkBtn'),
      resumeBtn: document.getElementById('resumeBtn'),
      openIndexBtn: document.getElementById('openIndexBtn'),
      menuTrigger: document.getElementById('menuTrigger'),
      menuPanel: document.getElementById('menuPanel'),
      readerContent: document.getElementById('readerContent'),
      pagination: document.getElementById('pagination'),
      prevPageBtn: document.getElementById('prevPageBtn'),
      nextPageBtn: document.getElementById('nextPageBtn'),
      pageSelect: document.getElementById('pageSelect'),
      bottomNote: document.getElementById('bottomNote')
    };

    function loadSettings() {
      try {
        const saved = JSON.parse(localStorage.getItem(SETTINGS_KEY));
        if (saved && typeof saved === 'object') {
          state.settings = { ...state.settings, ...saved };
        }
      } catch (error) {
        console.warn('Could not load settings', error);
      }
    }

    function saveSettings() {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings));
    }

    function applyTheme() {
      document.body.classList.toggle('dark', state.settings.theme === 'dark');
      if (els.themeToggle) {
        els.themeToggle.textContent = state.settings.theme === 'dark' ? 'Light mode' : 'Dark mode';
      }
    }

    function getSelectedSurah() {
      return SURAHS.find((surah) => surah.id === state.selectedSurahId) || SURAHS[0];
    }

    function toArabicDigits(value) {
      return String(value).replace(/\d/g, (digit) => '٠١٢٣٤٥٦٧٨٩'[Number(digit)]);
    }

    function normaliseText(text) {
      return String(text)
        .toLowerCase()
        .normalize('NFKD')
        .replace(/[\u0300-\u036f]/g, '');
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function filteredSurahs() {
      const q = normaliseText(state.query.trim());
      if (!q) return SURAHS;
      return SURAHS.filter((surah) => {
        return [surah.en, surah.ar, String(surah.id), surah.place].some((field) => normaliseText(field).includes(q));
      });
    }

    function renderSurahList() {
      const items = filteredSurahs();
      if (!items.length) {
        els.surahList.innerHTML = '<div class="empty">No surah matched your search.</div>';
        return;
      }

      els.surahList.innerHTML = items.map((surah) => `
        <button class="surah-item ${surah.id === state.selectedSurahId ? 'active' : ''}" type="button" data-surah-id="${surah.id}">
          <span class="surah-no">${surah.id}</span>
          <span class="surah-meta">
            <p class="surah-ar">${escapeHtml(surah.ar)}</p>
            <p class="surah-en">${escapeHtml(surah.en)}</p>
            <div class="surah-type">${escapeHtml(surah.place)}, ${surah.ayahs} verses</div>
          </span>
        </button>
      `).join('');
    }

    function estimateVerseWeight(verse) {
      const text = verse.arabic || '';
      return Math.max(1, Math.ceil(text.length / 34));
    }

    function paginateVerses(verses) {
      const surah = getSelectedSurah();
      const targetUnits = window.innerWidth < 640 ? 20 : window.innerWidth < 900 ? 26 : 30;
      const pages = [];
      let current = [];
      let used = 0;

      verses.forEach((verse, index) => {
        const weight = estimateVerseWeight(verse);
        const isFirstVerse = index === 0;
        const extra = isFirstVerse && surah.id !== 9 ? 3 : 0;

        if (current.length && used + weight + extra > targetUnits) {
          pages.push(current);
          current = [];
          used = 0;
        }

        current.push(verse);
        used += weight + extra;
      });

      if (current.length) pages.push(current);
      return pages;
    }

    async function fetchSurahVerses(surahId) {
      if (state.cache.has(surahId)) {
        return state.cache.get(surahId);
      }

      const surah = SURAHS.find((item) => item.id === surahId);
      const perPage = 50;
      const pages = Math.ceil(surah.ayahs / perPage);
      const requests = [];

      for (let page = 1; page <= pages; page += 1) {
        requests.push(
          fetch(`${API_BASE}/verses/by_chapter/${surahId}?fields=text_uthmani&per_page=${perPage}&page=${page}`)
            .then((response) => {
              if (!response.ok) {
                throw new Error(`Could not load surah ${surahId}, page ${page}`);
              }
              return response.json();
            })
        );
      }

      const payloads = await Promise.all(requests);
      const verses = payloads
        .flatMap((payload) => payload.verses || payload.data?.verses || [])
        .filter((verse) => verse.verse_number && verse.text_uthmani)
        .sort((a, b) => a.verse_number - b.verse_number)
        .map((verse) => ({
          number: verse.verse_number,
          arabic: verse.text_uthmani
        }));

      if (!verses.length) {
        throw new Error(`No verses returned for surah ${surahId}`);
      }

      state.cache.set(surahId, verses);
      return verses;
    }

    function renderReader() {
      const surah = getSelectedSurah();
      const pageVerses = state.pages[state.currentPage] || [];

      if (!pageVerses.length) {
        els.readerContent.innerHTML = '<div class="empty">No verses to show.</div>';
        els.pagination.hidden = true;
        return;
      }

      const firstVerse = pageVerses[0]?.number;
      const lastVerse = pageVerses[pageVerses.length - 1]?.number;
      const showBismillah = surah.id !== 9 && state.currentPage === 0;

      const mushafText = pageVerses.map((verse) => `
        <span class="ayah-inline">${escapeHtml(verse.arabic)} <span class="ayah-marker">${toArabicDigits(verse.number)}</span></span>
      `).join(' ');

      els.readerContent.innerHTML = `
        <header class="surah-header">
          <p class="arabic-name">${escapeHtml(surah.ar)}</p>
          <p class="english-name">${escapeHtml(surah.en)}</p>
          <div class="surah-subtitle">Surah ${surah.id}, ${escapeHtml(surah.place)}, verses ${firstVerse} to ${lastVerse}</div>
        </header>
        ${showBismillah ? '<div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>' : ''}
        <div class="verses">
          <div class="mushaf-block">${mushafText}</div>
          <div class="verse-meta">${surah.id}:${firstVerse}-${lastVerse}</div>
        </div>
      `;

      els.pagination.hidden = false;
      els.prevPageBtn.disabled = state.currentPage === 0;
      els.nextPageBtn.disabled = state.currentPage >= state.pages.length - 1;
      els.statusText.textContent = `${surah.en} • Page ${state.currentPage + 1} of ${state.pages.length}`;
      els.bottomNote.textContent = `Showing Surah ${surah.id} in Uthmani script. Bookmark saves surah and page.`;
      renderPageSelect();
    }

    function renderPageSelect() {
      const options = state.pages.map((_, index) => {
        const first = state.pages[index][0]?.number ?? 1;
        const last = state.pages[index][state.pages[index].length - 1]?.number ?? first;
        return `<option value="${index}" ${index === state.currentPage ? 'selected' : ''}>${index + 1} • ${first}-${last}</option>`;
      }).join('');
      els.pageSelect.innerHTML = options;
    }

    async function selectSurah(surahId, preferredPage = 0) {
      state.selectedSurahId = surahId;
      state.loading = true;
      renderSurahList();
      els.statusText.textContent = 'Loading surah…';
      els.readerContent.innerHTML = '<div class="loading">Loading surah…</div>';
      els.pagination.hidden = true;

      try {
        const verses = await fetchSurahVerses(surahId);
        state.verses = verses;
        state.pages = paginateVerses(verses);
        state.currentPage = Math.min(Math.max(preferredPage, 0), Math.max(state.pages.length - 1, 0));
        renderReader();
        history.replaceState(null, '', `#surah-${surahId}-page-${state.currentPage + 1}`);
      } catch (error) {
        console.error(error);
        els.statusText.textContent = 'Could not load the surah';
        els.readerContent.innerHTML = '<div class="error">The surah could not be loaded from the API right now. Please try again.</div>';
        els.pagination.hidden = true;
      } finally {
        state.loading = false;
      }
    }

    function saveBookmark() {
      const surah = getSelectedSurah();
      const payload = {
        surahId: surah.id,
        page: state.currentPage,
        savedAt: new Date().toISOString()
      };
      localStorage.setItem(BOOKMARK_KEY, JSON.stringify(payload));
      els.statusText.textContent = `Bookmark saved for ${surah.en}, page ${state.currentPage + 1}`;
    }

    function loadBookmark() {
      try {
        const bookmark = JSON.parse(localStorage.getItem(BOOKMARK_KEY));
        if (!bookmark || !bookmark.surahId) return null;
        return bookmark;
      } catch (error) {
        console.warn('Could not load bookmark', error);
        return null;
      }
    }

    async function resumeBookmark() {
      const bookmark = loadBookmark();
      if (!bookmark) {
        els.statusText.textContent = 'No bookmark saved yet';
        return;
      }
      await selectSurah(bookmark.surahId, bookmark.page || 0);
    }

    function parseHash() {
      const match = window.location.hash.match(/surah-(\d+)-page-(\d+)/i);
      if (!match) return null;
      const surahId = Number(match[1]);
      const page = Math.max(0, Number(match[2]) - 1);
      if (!SURAHS.find((surah) => surah.id === surahId)) return null;
      return { surahId, page };
    }

    function closeMenu() {
      els.menuPanel.classList.remove('open');
      els.menuTrigger.setAttribute('aria-expanded', 'false');
    }

    function openMenu() {
      els.menuPanel.classList.add('open');
      els.menuTrigger.setAttribute('aria-expanded', 'true');
    }

    function toggleMenu() {
      const isOpen = els.menuPanel.classList.contains('open');
      if (isOpen) {
        closeMenu();
      } else {
        openMenu();
      }
    }

    function openIndexPanel() {
      els.sidebar.classList.add('open');
      els.sidebarBackdrop.classList.add('open');
    }

    function closeIndexPanel() {
      els.sidebar.classList.remove('open');
      els.sidebarBackdrop.classList.remove('open');
    }

    function bindEvents() {
      els.surahSearch.addEventListener('input', (event) => {
        state.query = event.target.value;
        renderSurahList();
      });

      els.surahList.addEventListener('click', (event) => {
        const button = event.target.closest('[data-surah-id]');
        if (!button) return;
        closeIndexPanel();
        selectSurah(Number(button.dataset.surahId), 0);
      });

      els.menuTrigger.addEventListener('click', (event) => {
        event.stopPropagation();
        toggleMenu();
      });

      els.themeToggle.addEventListener('click', () => {
        state.settings.theme = state.settings.theme === 'dark' ? 'light' : 'dark';
        applyTheme();
        saveSettings();
        closeMenu();
      });

      els.bookmarkBtn.addEventListener('click', () => {
        saveBookmark();
        closeMenu();
      });

      els.resumeBtn.addEventListener('click', async () => {
        closeMenu();
        await resumeBookmark();
      });

      els.openIndexBtn.addEventListener('click', () => {
        closeMenu();
        openIndexPanel();
      });

      els.sidebarClose.addEventListener('click', closeIndexPanel);
      els.sidebarBackdrop.addEventListener('click', closeIndexPanel);

      document.addEventListener('click', (event) => {
        if (!event.target.closest('.menu-wrap')) {
          closeMenu();
        }
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          closeMenu();
          closeIndexPanel();
        }
      });

      els.prevPageBtn.addEventListener('click', () => {
        if (state.currentPage > 0) {
          state.currentPage -= 1;
          renderReader();
          history.replaceState(null, '', `#surah-${state.selectedSurahId}-page-${state.currentPage + 1}`);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });

      els.nextPageBtn.addEventListener('click', () => {
        if (state.currentPage < state.pages.length - 1) {
          state.currentPage += 1;
          renderReader();
          history.replaceState(null, '', `#surah-${state.selectedSurahId}-page-${state.currentPage + 1}`);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });

      els.pageSelect.addEventListener('change', (event) => {
        state.currentPage = Number(event.target.value);
        renderReader();
        history.replaceState(null, '', `#surah-${state.selectedSurahId}-page-${state.currentPage + 1}`);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      window.addEventListener('resize', () => {
        if (!state.verses.length) return;
        const currentVerse = state.pages[state.currentPage]?.[0]?.number || 1;
        state.pages = paginateVerses(state.verses);
        const newPageIndex = state.pages.findIndex((page) => page[0]?.number === currentVerse);
        state.currentPage = newPageIndex >= 0 ? newPageIndex : 0;
        renderReader();
      });
    }

    async function init() {
      loadSettings();
      applyTheme();
      renderSurahList();
      bindEvents();

      const hashState = parseHash();
      const bookmark = loadBookmark();

      if (hashState) {
        await selectSurah(hashState.surahId, hashState.page);
        return;
      }

      if (bookmark) {
        await selectSurah(bookmark.surahId, bookmark.page || 0);
        return;
      }

      await selectSurah(1, 0);
    }

    init();
  </script>
