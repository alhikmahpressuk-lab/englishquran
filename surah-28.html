<!-- 2) REPLACE applyMode() -->
<script>
function applyMode(mode) {
  currentMode = mode;
  modeButtons.forEach((button) => button.classList.toggle('active', button.dataset.mode === mode));
  versesContainer.classList.remove('hidden-arabic', 'hidden-english', 'hidden-transliteration');
  noteState.style.display = 'none';

  if (!isTranslationAudioEnabled() && (
    translationTapMode !== 'off' ||
    translationContinueActive ||
    translationSpeechActive ||
    translationBridgeAudio ||
    translationSpeechAudio ||
    translationSpeechUtterance
  )) {
    stopTranslationFlow(true);
    hidePrompt();
  }

  if (mode === 'bilingual') {
    versesContainer.classList.add('hidden-transliteration');
    refreshInlineStates();
    return;
  }

  if (mode === 'transliteration') {
    if (!transliterationAvailable) {
      noteState.style.display = 'block';
      versesContainer.classList.add('hidden-transliteration');
      currentMode = 'bilingual';
      modeButtons.forEach((button) => button.classList.toggle('active', button.dataset.mode === 'bilingual'));
      refreshInlineStates();
      return;
    }
    refreshInlineStates();
    return;
  }

  if (mode === 'arabic-only') {
    versesContainer.classList.add('hidden-english', 'hidden-transliteration');
    refreshInlineStates();
    return;
  }

  if (mode === 'english-only') {
    versesContainer.classList.add('hidden-arabic', 'hidden-transliteration');
  }

  refreshInlineStates();
}
</script>

<!-- 3) REPLACE showTranslationAudioPrompt() -->
<script>
function showTranslationAudioPrompt(ayah) {
  const safeAyah = Number(ayah);

  if (!isTranslationAudioEnabled()) {
    showBookmarkMessage('Translation audio is available only in English Only mode.');
    return;
  }

  const isActive = (
    translationTapMode !== 'off' ||
    translationContinueActive ||
    translationSpeechActive ||
    translationBridgeAudio ||
    translationSpeechAudio ||
    translationSpeechUtterance
  );

  const resumeOrStart = async (mode) => {
    hidePrompt();

    const canResume =
      isActive &&
      translationTapMode === mode &&
      isTranslationPlaybackPaused();

    if (canResume) {
      await toggleTranslationPlayback();
      return;
    }

    await runTranslationFlow(safeAyah, mode, true);
  };

  showPrompt(
    `Translation audio · Verse ${safeAyah}`,
    'Choose how to continue from this verse.',
    [
      {
        label: 'Play / Continue',
        primary: true,
        onClick: async () => {
          await resumeOrStart('translation');
        }
      },
      {
        label: 'Arabic + English',
        primary: false,
        onClick: async () => {
          await resumeOrStart('with-arabic');
        }
      }
    ]
  );
}
</script>

<!-- 4) REPLACE THE verse-menu PART INSIDE renderVerseArticle() -->
<script>
function renderVerseArticle(verse) {
  const english = getCurrentTranslationText(verse.number);
  const cleanVerseArabic = stripEmbeddedVerseMarkers(verse.arabic);
  const notes = getVerseNotes();
  const wordsHtml = verse.words.map((word) => buildWordSpan(word, verse.number)).filter(Boolean).join(' ');
  const existingNote = notes[String(verse.number)] || '';
  const translationAudioDisabled = !isTranslationAudioEnabled();

  const transliterationBlock = verse.transliteration
    ? `<div class="transliteration-wrap notranslate" translate="no">${escapeHtml(verse.transliteration)}</div>`
    : `<div class="transliteration-wrap notranslate" translate="no">Transliteration not available for this verse.</div>`;

  return `
    <article class="verse notranslate" id="ayah-${verse.number}" data-ayah-number="${verse.number}" tabindex="-1" translate="no">
      <div class="arabic-wrap notranslate" translate="no">
        <div class="arabic-ayah notranslate" lang="ar" translate="no">${wordsHtml || escapeHtml(cleanVerseArabic)} <span class="ayah-end-marker notranslate" translate="no">﴿${toArabicDigits(verse.number)}﴾</span></div>
      </div>

      <div class="word-meaning-panel notranslate" id="word-panel-${verse.number}" translate="no">
        <div class="word-meaning-arabic"></div>
        <div class="word-meaning-translit"></div>
        <div class="word-meaning-gloss"></div>
      </div>

      ${transliterationBlock}

      <div class="english notranslate" translate="no">
        <div class="english-number notranslate" translate="no">${verse.number}.</div>
        <div class="english-text notranslate" translate="no">${buildTranslationTextHtml(english, verse.number)}</div>
      </div>

      <div class="note-indicator notranslate ${existingNote ? 'active' : ''}" data-note-indicator="${verse.number}" translate="no">${existingNote ? 'Private note saved for this verse.' : ''}</div>

      <div class="verse-toolbar-wrap">
        <div class="verse-toolbar" data-toolbar="${verse.number}">
          <button class="icon-btn" type="button" data-menu-toggle="menu-${verse.number}" aria-label="Verse actions" title="Verse actions" translate="no">${iconMore()}</button>
          <div class="verse-menu" id="menu-${verse.number}" translate="no">
            <button class="menu-item-btn" type="button" data-pin-ayah="${verse.number}">${iconPin()}<span>Pin</span></button>
            <button class="menu-item-btn" type="button" data-share-ayah="${verse.number}">${iconShare()}<span>Share</span></button>
            <button class="menu-item-btn" type="button" data-copy-ayah="${verse.number}">${iconCopy()}<span>Copy verse</span></button>
            <button class="menu-item-btn" type="button" data-note-ayah="${verse.number}">${iconNote()}<span>Notes</span></button>
            <button class="menu-item-btn" type="button" data-translation-audio-ayah="${verse.number}" ${translationAudioDisabled ? 'disabled' : ''}>${iconVoice()}<span>Translation audio</span></button>
            <button class="menu-item-btn" type="button" data-wordtoggle-ayah="${verse.number}">${iconWord()}<span>Word by word</span></button>
            <button class="menu-item-btn" type="button" data-play-ayah="${verse.number}">${iconPlay()}<span>Play verse</span></button>
            <button class="menu-item-btn" type="button" data-repeat-ayah="${verse.number}">${iconRepeat()}<span>Repeat verse</span></button>
            <button class="menu-item-btn" type="button" data-start-ayah="${verse.number}">${iconStartFromHere()}<span>Start recitation from here</span></button>
          </div>
        </div>
      </div>

      <div class="verse-note-panel notranslate" id="note-panel-${verse.number}" translate="no">
        <div class="note-preview">
          <div class="note-preview-title" translate="no">Verse ${verse.number}</div>
          <div class="note-preview-text" translate="no">${escapeHtml(english)}</div>
        </div>
        <textarea aria-label="Private note for verse ${verse.number}" placeholder="Write your private note for this verse...">${escapeHtml(existingNote)}</textarea>
        <div class="note-panel-actions">
          <button class="note-save-btn" type="button" data-note-save="${verse.number}" translate="no">Save note</button>
          <button class="note-copy-btn" type="button" data-note-copy="${verse.number}" translate="no">Copy note</button>
          <button class="note-share-btn" type="button" data-note-share="${verse.number}" translate="no">Share note</button>
          <button class="note-clear-btn" type="button" data-note-clear="${verse.number}" translate="no">Clear note</button>
          <button class="note-close-btn" type="button" data-note-cancel="${verse.number}" translate="no">Close</button>
        </div>
        <div class="note-warning" translate="no"></div>
      </div>
    </article>
  `;
}
</script>

<!-- 5) UPDATE refreshInlineStates() -->
<script>
function refreshInlineStates() {
  document.querySelectorAll('[data-pin-ayah]').forEach((button) => {
    const ayah = Number(button.getAttribute('data-pin-ayah'));
    button.classList.toggle('active', isVersePinned(ayah));
  });

  document.querySelectorAll('[data-wordtoggle-ayah]').forEach((button) => {
    button.classList.toggle('active', wordModeEnabled);
    button.disabled = currentAudioView === 'synced';
  });

  document.querySelectorAll('[data-play-ayah], [data-repeat-ayah]').forEach((button) => {
    button.disabled = currentAudioView === 'synced';
  });

  document.querySelectorAll('[data-translation-audio-ayah]').forEach((button) => {
    button.disabled = !isTranslationAudioEnabled();
    button.classList.toggle('active', isTranslationAudioEnabled() && translationTapMode !== 'off');
  });

  document.querySelectorAll('.note-indicator').forEach((indicator) => {
    updateNoteIndicator(indicator.getAttribute('data-note-indicator'));
  });
}
</script>

<!-- 6) UPDATE THE translation-audio CLICK HANDLER INSIDE attachInteractiveHandlers() -->
<script>
document.querySelectorAll('[data-translation-audio-ayah]').forEach((button) => {
  button.addEventListener('click', (event) => {
    event.stopPropagation();

    if (!isTranslationAudioEnabled()) {
      showBookmarkMessage('Translation audio is available only in English Only mode.');
      return;
    }

    showTranslationAudioPrompt(Number(button.getAttribute('data-translation-audio-ayah')));
    showActionPulse(button);
  });
});
</script>
